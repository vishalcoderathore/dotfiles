# ─────────────────────────────────────────────────────────
#  General
# ─────────────────────────────────────────────────────────

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (click to select panes/windows, scroll)
set -g mouse on

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Remove delay after pressing Escape (important for Neovim)
set -sg escape-time 0

# Use 256 colours + true colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ─────────────────────────────────────────────────────────
#  Key Bindings
# ─────────────────────────────────────────────────────────

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | (vertical) and - (horizontal), open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with prefix + h/j/k/l (Vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ─────────────────────────────────────────────────────────
#  Plugins (TPM)
# ─────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # sane defaults
set -g @plugin 'catppuccin/tmux#v2.1.3'        # Catppuccin Mocha theme
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions manually
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions every 10 min

# ─────────────────────────────────────────────────────────
#  Catppuccin Theme
# ─────────────────────────────────────────────────────────

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Date/time format shown in status bar
set -g @catppuccin_date_time_text "%a %d %b  %H:%M"

# ─────────────────────────────────────────────────────────
#  Status Bar
# ─────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-interval 5

# Left: session name + window count
set -g status-left-length 60
set -g status-left "#{E:@catppuccin_status_session} #[fg=#{@thm_overlay_0}]#{session_windows} windows "

# Right: zoomed indicator + IP + date/time + hostname
set -g status-right-length 120
set -g status-right "#{?window_zoomed_flag,#[fg=#{@thm_yellow}] [Z] ,}#[fg=#{@thm_green}] #(ip route get 1 2>/dev/null | awk '{print $7;exit}')  #{E:@catppuccin_status_date_time}#{E:@catppuccin_status_host}"

# ─────────────────────────────────────────────────────────
#  tmux-resurrect
# ─────────────────────────────────────────────────────────

# Restore pane contents on resurrect
set -g @resurrect-capture-pane-contents 'on'

# ─────────────────────────────────────────────────────────
#  tmux-continuum
# ─────────────────────────────────────────────────────────

# Auto-restore last saved session on tmux start
set -g @continuum-restore 'on'

# Save session every 10 minutes
set -g @continuum-save-interval '10'

# ─────────────────────────────────────────────────────────
#  Initialize TPM — must stay at the very bottom
# ─────────────────────────────────────────────────────────

run '~/.tmux/plugins/tpm/tpm'
